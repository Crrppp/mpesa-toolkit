<!-- frontend/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: Arial; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; width: 350px; color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: #334155; color: white; }
        button { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Business Login</h2>
        <input type="text" id="businessName" placeholder="Business Name">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="error"></p>
        <p style="margin-top:10px;"><a href="register.html" style="color:#3b82f6;">Register</a></p>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function login() {
            const name = document.getElementById('businessName').value;
            const pass = document.getElementById('password').value;
            try {
                const data = await apiCall('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ business_name: name, password: pass })
                });
                setToken(data.access_token);
                saveUser(data.user);
                window.location.href = 'dashboard.html';
            } catch(e) {
                document.getElementById('error').textContent = e.message;
            }
        }
    </script>
</body>
</html>
