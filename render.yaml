# render.yaml – Render Blueprint
services:
  - type: web
    name: mpesa-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mpesa-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FERNET_KEY
        sync: false
      - key: DARAA_CONSUMER_KEY
        sync: false
      - key: DARAA_CONSUMER_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: METABASE_SECRET_KEY
        sync: false
      - key: METABASE_SITE_URL
        sync: false

  - type: worker
    name: mpesa-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: celery -A backend.celery_app worker --loglevel=info
    envVars:
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false